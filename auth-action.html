<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Redefina sua senha do Groomin com segurança." />
<meta name="theme-color" content="#0F0F0F" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.png" />
<title>Redefinir senha - Groomin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
<style>
  body{min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg)}
  .auth-action{width:min(440px,100%);padding:28px;border:1px solid var(--border);border-radius:18px;background:linear-gradient(145deg,rgba(212,175,55,.10),transparent 42%),var(--surface);box-shadow:var(--shadow-lg)}
  .auth-action .brand{margin-bottom:26px}
  .auth-action h1{font-size:28px;line-height:1.12;margin-bottom:8px}
  .auth-action p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:18px}
  .auth-action .status{display:none;margin:14px 0;padding:12px 14px;border-radius:12px;border:1px solid var(--border);font-size:13px;line-height:1.45}
  .auth-action .status.ok{display:block;color:var(--ok);background:rgba(34,197,94,.10)}
  .auth-action .status.err{display:block;color:var(--danger);background:rgba(239,68,68,.10)}
  .auth-action .actions{display:flex;gap:10px;align-items:center;margin-top:18px}
  .auth-action .actions .btn{flex:1}
  .auth-action .fine{font-size:12.5px;margin-top:18px;margin-bottom:0}
  @media(max-width:520px){.auth-action{padding:22px;border-radius:14px}.auth-action .actions{flex-direction:column}.auth-action .actions .btn{width:100%}}
</style>
</head>
<body>
<main class="auth-action">
  <div class="brand"><span class="logo"><img src="/icon.svg" alt="" width="22" height="22"></span><span>Groomin<small>Seguranca da conta</small></span></div>
  <section id="resetPanel">
    <h1>Redefinir senha</h1>
    <p id="intro">Validando seu link de recuperacao...</p>
    <div id="status" class="status" role="status"></div>
    <form id="resetForm" hidden>
      <div class="field">
        <label>Nova senha</label>
        <div class="input-icon"><span aria-hidden="true">#</span><input class="input" type="password" id="newPassword" autocomplete="new-password" minlength="6" placeholder="Minimo 6 caracteres" required></div>
        <div class="err">Use pelo menos 6 caracteres.</div>
      </div>
      <div class="field">
        <label>Confirmar senha</label>
        <div class="input-icon"><span aria-hidden="true">#</span><input class="input" type="password" id="confirmPassword" autocomplete="new-password" minlength="6" placeholder="Repita a nova senha" required></div>
        <div class="err">As senhas precisam ser iguais.</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="submitBtn" type="submit">Salvar nova senha</button>
        <a class="btn btn-ghost" href="/app/#/login">Voltar ao login</a>
      </div>
    </form>
    <p class="fine">Se o link expirou, solicite um novo pela tela de login.</p>
  </section>
</main>
<script src="/js/firebase-config.js"></script>
<script type="module" src="/js/auth-action.js"></script>
</body>
</html>
